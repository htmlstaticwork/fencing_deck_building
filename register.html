<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | IronBark Outdoors</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F9F9F9; }
        .auth-card { width: 450px; padding: 3rem; background: #FFF; border: 1px solid #E0E0E0; }
        .dark-mode .auth-container { background: #1A1A1A; }
        .dark-mode .auth-card { background: #1E1E1E; border-color: #333; }
    </style>
</head>
<body class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5"><a href="index.html"><img src="assets/images/logo.svg" alt="Logo" height="40"></a></div>
            <h4 class="mb-4">Create Homeowner Account</h4>
            <form class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label small fw-bold">FIRST NAME</label><input type="text" class="form-control rounded-0" required></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">LAST NAME</label><input type="text" class="form-control rounded-0" required></div>
                    <div class="col-12"><label class="form-label small fw-bold">EMAIL</label><input type="email" class="form-control rounded-0" required></div>
                    <div class="col-12"><label class="form-label small fw-bold">PROJECT ID (OPTIONAL)</label><input type="text" class="form-control rounded-0" placeholder="e.g. #IB-9921"></div>
                    <div class="col-12"><label class="form-label small fw-bold">PASSWORD</label><input type="password" class="form-control rounded-0" required></div>
                    <div class="col-12"><button type="submit" class="btn btn-primary w-100 rounded-0 py-3 mt-3">Register Account</button></div>
                </div>
                <div class="text-center mt-4 small text-muted">Already have an account? <a href="login.html" class="text-accent fw-bold text-decoration-none">Login</a></div>
            </form>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>
</html>
