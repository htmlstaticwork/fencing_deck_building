<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | IronBark Outdoors</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: transparent; }
        .auth-card { width: 450px; padding: 3.5rem; background: var(--bg-color); border: 1px solid var(--border-color); }
        .floating-controls { position: fixed; top: 1rem; right: 1rem; z-index: 1000; }
        [dir="rtl"] .floating-controls { right: auto; left: 1rem; }
    </style>
</head>
<body>
    <div class="floating-controls d-flex gap-2">
        <button class="btn btn-link theme-toggle p-2" aria-label="Toggle Theme">
            <i class="bi bi-moon fs-4"></i>
        </button>
        <button class="btn btn-link rtl-toggle p-2" aria-label="Toggle Direction">
            <i class="bi bi-translate fs-4"></i>
        </button>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4"><a href="index.html"><img src="assets/images/logo.svg" alt="Logo" height="40"></a></div>
            <h4 class="mb-4 text-center">Create Homeowner Account</h4>
            <form class="needs-validation" novalidate>
                <div class="row g-2">
                    <div class="col-12"><label class="form-label small fw-bold">FULL NAME</label><input type="text" class="form-control rounded-0" required></div>
                    <div class="col-12"><label class="form-label small fw-bold">EMAIL</label><input type="email" class="form-control rounded-0" required></div>
                    <div class="col-12"><label class="form-label small fw-bold">PROJECT ID (OPTIONAL)</label><input type="text" class="form-control rounded-0" placeholder="e.g. #IB-9921"></div>
                    <div class="col-12"><label class="form-label small fw-bold">PASSWORD</label><input type="password" class="form-control rounded-0" required></div>
                    <div class="col-12"><label class="form-label small fw-bold">CONFIRM PASSWORD</label><input type="password" class="form-control rounded-0" required></div>
                    <div class="col-12"><button type="submit" class="btn btn-primary w-100 rounded-0 py-3 mt-2">Register Account</button></div>
                </div>
                <div class="text-center mt-3 small text-muted mb-3">Already have an account? <a href="login.html" class="text-accent fw-bold text-decoration-none">Login</a></div>
                <div class="border-top pt-3">
                    <p class="text-center small text-muted mb-2 text-uppercase fw-bold" style="letter-spacing: 1px;">Or Register With</p>
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="button" class="btn btn-outline-dark rounded-0 px-4 py-2 flex-grow-1"><i class="bi bi-google me-2"></i>Google</button>
                        <button type="button" class="btn btn-outline-dark rounded-0 px-4 py-2 flex-grow-1"><i class="bi bi-facebook me-2"></i>Facebook</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!-- Registration Section handled above by auth-container -->
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
