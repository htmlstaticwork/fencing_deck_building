<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | IronBark Outdoors</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand" href="index.html"><img src="assets/images/logo.svg" alt="Logo" height="40"></a></div></header>
    <main class="py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <h2 class="mb-4 fw-bold">Start Your Build</h2>
                    <p class="text-muted mb-5">Tell us about your project and we'll schedule an on-site precision measurement.</p>
                    <form class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label small fw-bold">NAME</label><input type="text" class="form-control rounded-0" required></div>
                            <div class="col-md-6"><label class="form-label small fw-bold">EMAIL</label><input type="email" class="form-control rounded-0" required></div>
                            <div class="col-md-6"><label class="form-label small fw-bold">PHONE</label><input type="tel" class="form-control rounded-0" required></div>
                            <div class="col-md-6"><label class="form-label small fw-bold">PROJECT TYPE</label>
                                <select class="form-select rounded-0" required>
                                    <option value="">Select...</option>
                                    <option>Fence</option>
                                    <option>Deck</option>
                                    <option>Arbor</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label small fw-bold">ADDRESS</label><input type="text" class="form-control rounded-0" required></div>
                            <div class="col-12"><label class="form-label small fw-bold">MESSAGE</label><textarea class="form-control rounded-0" rows="4" required placeholder="Describe your vision..."></textarea></div>
                            <div class="col-12"><button type="submit" class="btn btn-primary w-100 rounded-0 py-3">Send Project Details</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
